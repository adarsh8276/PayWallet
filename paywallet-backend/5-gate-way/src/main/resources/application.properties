spring.application.name=gate-way
server.port=${PORT:8080}

# Disable Eureka completely
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# CORS
spring.cloud.gateway.server.webflux.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.server.webflux.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.server.webflux.globalcors.corsConfigurations.[/**].allowCredentials=false

# Direct URLs
spring.cloud.gateway.server.webflux.routes[0].id=user-route
spring.cloud.gateway.server.webflux.routes[0].uri=https://paywallet-user-service.onrender.com
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[1].id=wallet-route
spring.cloud.gateway.server.webflux.routes[1].uri=https://paywallet-wallet-service.onrender.com
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/wallet/**

spring.cloud.gateway.server.webflux.routes[2].id=transaction-route
spring.cloud.gateway.server.webflux.routes[2].uri=https://paywallet-transaction-service.onrender.com
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/transfer/**

spring.cloud.gateway.server.webflux.routes[3].id=transaction-history-route
spring.cloud.gateway.server.webflux.routes[3].uri=https://paywallet-transaction-service.onrender.com
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/transactions/**

# Timeouts
spring.cloud.gateway.httpclient.connect-timeout=10000
spring.cloud.gateway.httpclient.response-timeout=60s