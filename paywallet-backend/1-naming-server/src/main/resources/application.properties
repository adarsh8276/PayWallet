spring.application.name=1-naming-server
server.port=${PORT:8761}

# Eureka Server config
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.server.wait-time-in-ms-when-sync-empty=0

# CRITICAL: Disable rate limiter (causes 429 when services restart on Render free tier)
eureka.server.rate-limiter-enabled=false

# Disable self-preservation mode (prevents Eureka from blocking re-registrations)
eureka.server.enable-self-preservation=false

# Evict instances faster (so stale crashed instances are removed quickly)
eureka.server.eviction-interval-timer-in-ms=5000

# Allow faster response threshold
eureka.server.renewal-percent-threshold=0.49