spring.application.name=4-transaction-service
server.port=${PORT:7000}

# Database
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?createDatabaseIfNotExist=true
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update

# Direct service URLs (bypasses unreliable Eureka on Render free tier)
user.service.url=${USER_SERVICE_URL:https://paywallet-user-service.onrender.com}
wallet.service.url=${WALLET_SERVICE_URL:https://paywallet-wallet-service.onrender.com}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVER}
spring.kafka.properties.security.protocol=SASL_SSL
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_USERNAME}" password="${KAFKA_PASSWORD}";
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# Eureka (kept but not relied on for routing)
eureka.client.service-url.defaultZone=${EUREKA_URL}/eureka
eureka.instance.prefer-ip-address=true

# Disable Zipkin
management.tracing.enabled=false
management.endpoints.web.exposure.include=health,info